<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🍊 2026 台灣遊戲橘子主管餐會 (V9.1)</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        body { background-color: #020617; color: white; font-family: sans-serif; margin: 0; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        @keyframes master-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes master-hop { 0%, 100% { margin-top: 0; } 50% { margin-top: -20px; } }
        .orange-animation-container { display: inline-block; animation: master-spin 0.8s infinite linear, master-hop 0.6s infinite ease-in-out; }
        .size-small { transform: scale(1); }
        .size-mid { transform: scale(1.8); }
        .size-big { transform: scale(3.2); }
        .name-card { animation: popIn 0.4s forwards; }
        @keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useEffect, useState, useRef } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyBlQH6QvHvwGSXMX2qJDKdLmo8wBD6oycg",
            authDomain: "gamania-raffle.firebaseapp.com",
            databaseURL: "https://gamania-raffle-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "gamania-raffle",
            storageBucket: "gamania-raffle.firebasestorage.app",
            messagingSenderId: "744074818232",
            appId: "1:744074818232:web:668c4f45b1c4a913dc3a4d"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.database();

        function RaffleApp() {
            const [participants, setParticipants] = useState([]);
            const [prizeSettings, setPrizeSettings] = useState([{ id: 1, name: "頭獎🎉", count: 1 }]);
            const [selectedPrizeIndex, setSelectedPrizeIndex] = useState(0);
            const [results, setResults] = useState([]);
            const [history, setHistory] = useState([]);
            const [isSpinning, setIsSpinning] = useState(false);
            const [adminOpen, setAdminOpen] = useState(false);
            const [adminTab, setAdminTab] = useState('list');
            const [listInput, setListInput] = useState("");
            const sortableRef = useRef(null);

            // 監聽雲端
            useEffect(() => {
                const raffleRef = db.ref("raffle_state");
                raffleRef.on("value", (snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        setParticipants(data.participants || []);
                        setPrizeSettings(data.prizeSettings || []);
                        setHistory(data.history || []);
                        setSelectedPrizeIndex(data.selectedPrizeIndex || 0);
                        if (data.isSpinning && !isSpinning) {
                            setIsSpinning(true);
                            setResults([]);
                            setTimeout(() => {
                                setResults(data.winners || []);
                                setIsSpinning(false);
                            }, 1500);
                        }
                    }
                });
                return () => raffleRef.off();
            }, [isSpinning]);

            // 手機端開獎
            const handleStartDrawRequest = () => {
                if (isSpinning || participants.length === 0) return;
                
                const currentPrize = prizeSettings[selectedPrizeIndex];
                let pool = [...participants];
                let winners = [];
                const drawNum = Math.min(currentPrize.count, pool.length);
                
                for (let i = 0; i < drawNum; i++) {
                    const idx = Math.floor(Math.random() * pool.length);
                    winners.push(pool[idx]);
                    pool.splice(idx, 1);
                }

                const newHistory = [...winners.map(w => ({ time: new Date().toLocaleTimeString(), name: w, prize: currentPrize.name })), ...history];

                // 同步雲端
                db.ref("raffle_state").update({
                    isSpinning: true,
                    winners: winners,
                    participants: pool,
                    history: newHistory
                });

                setTimeout(() => {
                    db.ref("raffle_state").update({ isSpinning: false });
                }, 2000);
            };

            // 管理存檔 (關鍵動作)
            const handleAdminSave = () => {
                const updatedPool = listInput.split('\n').map(n => n.trim()).filter(n => n !== "");
                db.ref("raffle_state").set({
                    participants: updatedPool,
                    prizeSettings: prizeSettings,
                    history: [],
                    selectedPrizeIndex: 0,
                    isSpinning: false,
                    winners: []
                }).then(() => {
                    alert("同步成功！");
                    setAdminOpen(false);
                }).catch(err => {
                    alert("同步失敗：" + err.message);
                });
            };

            const downloadCSV = () => {
                const header = "\ufeff時間,獎項,中獎人\n";
                const content = history.map(h => `${h.time},${h.prize},${h.name}`).join("\n");
                const blob = new Blob([header + content], { type: "text/csv;charset=utf-8;" });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.download = `中獎名單.csv`;
                link.click();
            };

            const layout = ((n) => {
                if (n <= 1) return { grid: 'grid-cols-1', font: 'text-3xl lg:text-7xl', py: 'py-10' };
                if (n <= 4) return { grid: 'grid-cols-2', font: 'text-xl lg:text-5xl', py: 'py-6' };
                return { grid: 'grid-cols-2 lg:grid-cols-4', font: 'text-lg lg:text-xl', py: 'py-4' };
            })(results.length);

            return (
                <div className="flex flex-col p-3 lg:p-4 min-h-screen">
                    <button onClick={() => setAdminOpen(true)} className="absolute top-4 left-4 opacity-30 hover:opacity-100 text-2xl z-50">⚙️</button>
                    <header className="shrink-0 text-center py-2 mb-2 italic">
                        <h1 className="text-xl lg:text-2xl font-black text-orange-500 uppercase tracking-tighter">🍊 2026 台灣遊戲橘子主管餐會</h1>
                    </header>

                    <main className="flex-1 flex flex-col lg:grid lg:grid-cols-12 gap-4">
                        <div className="flex-[2] lg:col-span-9 bg-slate-900 rounded-[2rem] p-4 lg:p-6 flex flex-col border border-slate-800 shadow-2xl relative min-h-[450px] overflow-hidden text-white">
                            <div className="shrink-0 flex justify-between items-center mb-4 border-b border-white/5 pb-3">
                                <div className="text-sm lg:text-xl font-black">{prizeSettings[selectedPrizeIndex]?.name}</div>
                                <select className="bg-slate-800 text-white text-xs px-2 py-1 rounded-xl border border-slate-700 outline-none" 
                                    value={selectedPrizeIndex} 
                                    onChange={(e) => db.ref("raffle_state").update({selectedPrizeIndex: parseInt(e.target.value)})}>
                                    {prizeSettings.map((p, i) => <option key={i} value={i}>{p.name} ({p.count}人)</option>)}
                                </select>
                            </div>
                            <div className="flex-1 w-full bg-black/40 rounded-2xl p-3 flex items-center justify-center relative">
                                {isSpinning ? (
                                    <div className={selectedPrizeIndex === 0 ? "size-big" : "size-mid"}>
                                        <div className="orange-animation-container">
                                            <svg width="80" height="80" viewBox="0 0 512 512"><circle cx="256" cy="280" r="210" fill="#FF922B" stroke="#333" strokeWidth="10"/><path d="M256 70 C 270 20, 350 20, 380 70 C 350 100, 270 100, 256 70 Z" fill="#40C057" stroke="#333" strokeWidth="10"/><path d="M256 70 L 256 120" stroke="#333" strokeWidth="15" strokeLinecap="round"/></svg>
                                        </div>
                                    </div>
                                ) : results.length > 0 ? (
                                    <div className={`grid ${layout.grid} gap-3 w-full`}>
                                        {results.map((name, i) => (
                                            <div key={i}
